apiVersion: v1
kind: Namespace
metadata:
  name: storage
  labels:
    pod-security.kubernetes.io/enforce: privileged
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: local-path-provisioner-service-account
  namespace: storage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: local-path-provisioner
rules:
- apiGroups: [""]
  verbs: ["*"]
  resources: ["nodes", "persistentvolumeclaims", "persistentvolumes", "pods", "events"]
- apiGroups: [""]
  verbs: ["get", "list", "watch"]
  resources: ["configmaps"]
- apiGroups: ["storage.k8s.io"]
  verbs: ["*"]
  resources: ["storageclasses"]
- apiGroups: ["coordination.k8s.io"]
  verbs: ["*"]
  resources: ["leases"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: local-path-provisioner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: local-path-provisioner
subjects:
- kind: ServiceAccount
  name: local-path-provisioner-service-account
  namespace: storage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: local-path-config
  namespace: storage
data:
  config.json: |
    {
      "nodePathMap":[
        {
          "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
          "paths":["/var/local-path-provisioner"]
        }
      ]
    }
  setup: |
    #!/bin/bash
    set -euo pipefail
    while getopts "m:s:p:" opt; do
      case $opt in
        p) absolutePath=$OPTARG;;
        s) sizeInBytes=$OPTARG;;
        m) volMode=$OPTARG;;
      esac
    done
    mkdir -m 0777 -p "${absolutePath}"
    chmod 0777 "${absolutePath}"
  teardown: |
    #!/bin/bash
    set -euo pipefail
    while getopts "m:s:p:" opt; do
      case $opt in
        p) absolutePath=$OPTARG;;
        s) sizeInBytes=$OPTARG;;
        m) volMode=$OPTARG;;
      esac
    done
    rm -rf "${absolutePath}"
  helperPod.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: helper-pod
    spec:
      containers:
      - name: helper-pod
        image: busybox
        command: ["sh", "-c", "echo 'helper pod running' && sleep 3600"]
        securityContext:
          privileged: true
      restartPolicy: Always
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local-path
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: local-path.storage.io
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: local-path-provisioner
  namespace: storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: local-path-provisioner
  template:
    metadata:
      labels:
        app: local-path-provisioner
    spec:
      serviceAccountName: local-path-provisioner-service-account
      containers:
      - name: local-path-provisioner
        image: rancher/local-path-provisioner:v0.0.24
        imagePullPolicy: IfNotPresent
        command:
        - local-path-provisioner
        - --debug
        - start
        - --provisioner-name=local-path.storage.io
        - --config=/etc/config/config.json
        - --namespace=storage
        - --helper-image=busybox
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        volumeMounts:
        - name: config
          mountPath: /etc/config
        - name: storage-location
          mountPath: /var/local-path-provisioner
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: local-path-config
      - name: storage-location
        hostPath:
          path: /var/local-path-provisioner
          type: DirectoryOrCreate