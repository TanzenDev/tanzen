{{- if .Values.networkPolicies.enabled }}
# ---------------------------------------------------------------------------
# Cilium NetworkPolicies — deny-all default with explicit allow-list.
#
# Works on both kind-tanzen and talos clusters (Cilium installed on both).
# Disabled by default; enable via networkPolicies.enabled=true.
# Talos: tanzenctl up --set networkPolicies.enabled=true
#
# Pod label selectors verified against deployed pods (2026-04-26):
#   worker          → app: tanzen-worker
#   postgres        → app.kubernetes.io/name: postgresql  (CNPG)
#   redis           → app.kubernetes.io/name: redis
#   temporal        → app.kubernetes.io/name: temporal
#   seaweedfs-filer → app.kubernetes.io/name: seaweedfs-filer
#
# Defense-in-depth layer:
#   Inner: Deno --deny-net (V8 isolate, user-code boundary)
#   Outer: Cilium CNP (kernel eBPF, cannot be bypassed from user code)
# ---------------------------------------------------------------------------

# tanzen-worker: deny all egress except required backends.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tanzen-worker-egress
  namespace: {{ .Values.global.namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: tanzen-worker
  egress:
    # Temporal frontend (workflow scheduling + activity polling)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: frontend
      toPorts:
        - ports:
            - port: "7233"
              protocol: TCP

    # SeaweedFS filer (S3 artifact/script storage)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: seaweedfs-filer
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
            - port: "8333"
              protocol: TCP

    # Redis (pub/sub event stream)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP

    # DNS (kube-dns — required for all service name resolution)
    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

# tanzen-worker: deny all ingress except Prometheus scraping.
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tanzen-worker-ingress
  namespace: {{ .Values.global.namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: tanzen-worker
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9464"
              protocol: TCP

# tanzen-api (future): deny all egress except required backends.
# The API pod is not yet deployed in-cluster; this policy takes effect
# when it is (matched by app: tanzen-api label on the Deployment).
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tanzen-api-egress
  namespace: {{ .Values.global.namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: tanzen-api
  egress:
    # PostgreSQL (CNPG primary — read-write service)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: postgresql
            role: primary
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: seaweedfs-filer
      toPorts:
        - ports:
            - port: "8888"
              protocol: TCP
            - port: "8333"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: temporal
            app.kubernetes.io/component: frontend
      toPorts:
        - ports:
            - port: "7233"
              protocol: TCP

    - toEndpoints:
        - matchLabels:
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
{{- end }}
