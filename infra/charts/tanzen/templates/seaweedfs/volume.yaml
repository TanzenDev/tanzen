{{- if .Values.seaweedfs.enabled }}
# =============================================================================
# SeaweedFS — Volume Server
# Stores the actual object data. Registers with the master on startup.
# =============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs-volume
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: seaweedfs-volume
    app.kubernetes.io/component: volume
    app.kubernetes.io/part-of: tanzen
spec:
  replicas: {{ .Values.seaweedfs.volume.replicaCount }}
  serviceName: seaweedfs-volume
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs-volume
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs-volume
        app.kubernetes.io/component: volume
        app.kubernetes.io/part-of: tanzen
    spec:
      containers:
        - name: seaweedfs-volume
          image: {{ .Values.seaweedfs.volume.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          args:
            - volume
            - -mserver=seaweedfs-master:{{ .Values.seaweedfs.master.service.httpPort }}
            - -port=8080
            - -dir=/data
            - -max=0   # Auto-detect disk capacity
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.seaweedfs.volume.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.global.storageClass }}
        storageClassName: {{ .Values.global.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.seaweedfs.volume.storage.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-volume
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: seaweedfs-volume
    app.kubernetes.io/component: volume
    app.kubernetes.io/part-of: tanzen
spec:
  type: ClusterIP
  clusterIP: None   # Headless — StatefulSet members addressed individually
  selector:
    app.kubernetes.io/name: seaweedfs-volume
  ports:
    - name: http
      port: 8080
      targetPort: http
{{- end }}
