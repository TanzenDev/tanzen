apiVersion: v2
name: tanzen
description: >
  Tanzen — Agent Workflow Orchestration Platform.
  Umbrella chart that deploys all backing services required for
  Temporal-based durable workflow execution in a regulated environment.
type: application
version: 0.1.0
appVersion: "0.1.0"

dependencies:
  # NOTE: CloudNativePG operator is NOT a sub-chart — bootstrap.sh installs it
  # cluster-wide via its own Helm release. The postgres.yaml template in this
  # chart only deploys the Cluster CR, which the operator picks up.

  # Temporal server
  - name: temporal
    version: "0.44.0"
    repository: "https://go.temporal.io/helm-charts"
    condition: temporal.enabled

  # Bitnami Redis (standalone, pub/sub only)
  - name: redis
    version: "25.3.11"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
    alias: redis

  # kube-prometheus-stack (Prometheus + Grafana)
  - name: kube-prometheus-stack
    version: "60.3.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.enabled
