# Kind cluster configuration for CI (GitHub Actions).
# Uses kindnet (default CNI) and standard kube-proxy instead of Cilium,
# which requires eBPF kernel features unavailable in hosted runners.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: tanzen-ci

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      - containerPort: 30000
        hostPort: 30000
        protocol: TCP
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"

networking:
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
