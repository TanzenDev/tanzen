name: Infrastructure Smoke Tests

on:
  push:
    branches: [main, dev]
    paths:
      - 'infra/**'
      - 'worker/**'
      - 'mcp/**'
      - '.github/workflows/infra-smoke.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'
      - 'worker/**'
      - 'mcp/**'
      - '.github/workflows/infra-smoke.yaml'

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: infra-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    name: Deploy and Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Install tools
      # ------------------------------------------------------------------
      - name: Install kind
        uses: helm/kind-action@v1.10.0
        with:
          install_only: true
          version: v0.23.0

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      # ------------------------------------------------------------------
      # 3. Cache Helm charts
      # ------------------------------------------------------------------
      - name: Cache Helm repositories
        uses: actions/cache@v4
        with:
          path: ~/.cache/helm
          key: helm-repos-${{ hashFiles('infra/charts/tanzen/Chart.yaml') }}
          restore-keys: |
            helm-repos-

      # ------------------------------------------------------------------
      # 4. Set up Docker Buildx with GHA layer cache
      # ------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ------------------------------------------------------------------
      # 5. Create Kind cluster (must exist before kind load)
      # ------------------------------------------------------------------
      - name: Create Kind cluster
        run: |
          kind create cluster \
            --name tanzen-ci \
            --config infra/scripts/kind-config-ci.yaml

      # ------------------------------------------------------------------
      # 6. Build app images and load into Kind
      #    Worker needs repo-root build context (copies infra/executor/).
      #    MCP servers build from their own subdirectory.
      # ------------------------------------------------------------------
      - name: Build and load tanzen-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: worker/Dockerfile
          tags: tanzen-worker:latest
          load: true
          cache-from: type=gha,scope=tanzen-worker
          cache-to: type=gha,scope=tanzen-worker,mode=max

      - name: Build and load mcp-fetch
        uses: docker/build-push-action@v6
        with:
          context: mcp/fetch
          tags: mcp-fetch:latest
          load: true
          cache-from: type=gha,scope=mcp-fetch
          cache-to: type=gha,scope=mcp-fetch,mode=max

      - name: Build and load mcp-sequential-thinking
        uses: docker/build-push-action@v6
        with:
          context: mcp/sequential-thinking
          tags: mcp-sequential-thinking:latest
          load: true
          cache-from: type=gha,scope=mcp-sequential-thinking
          cache-to: type=gha,scope=mcp-sequential-thinking,mode=max

      - name: Build and load mcp-falkordb
        uses: docker/build-push-action@v6
        with:
          context: mcp/falkordb
          tags: mcp-falkordb:latest
          load: true
          cache-from: type=gha,scope=mcp-falkordb
          cache-to: type=gha,scope=mcp-falkordb,mode=max

      - name: Load images into Kind
        run: |
          kind load docker-image tanzen-worker:latest          --name tanzen-ci
          kind load docker-image mcp-fetch:latest              --name tanzen-ci
          kind load docker-image mcp-sequential-thinking:latest --name tanzen-ci
          kind load docker-image mcp-falkordb:latest           --name tanzen-ci

      # ------------------------------------------------------------------
      # 7. Bootstrap: install operators + secrets + Helm chart
      #    Cluster already exists so bootstrap.sh skips kind create.
      # ------------------------------------------------------------------
      - name: Bootstrap cluster
        run: |
          chmod +x infra/scripts/bootstrap.sh
          ./infra/scripts/bootstrap.sh \
            --cluster tanzen-ci \
            --namespace tanzen-dev \
            --no-cilium \
            --extra-values infra/charts/tanzen/values-ci.yaml
        env:
          TANZEN_NAMESPACE: tanzen-dev

      # ------------------------------------------------------------------
      # 8. Wait for all pods to be ready (belt-and-suspenders)
      # ------------------------------------------------------------------
      - name: Wait for pods
        run: |
          kubectl wait --for=condition=ready pod \
            --all -n tanzen-dev \
            --timeout=300s
        continue-on-error: true   # smoke-test.sh will surface any issues

      # ------------------------------------------------------------------
      # 9. Run smoke tests
      # ------------------------------------------------------------------
      - name: Run smoke tests
        run: |
          chmod +x infra/scripts/smoke-test.sh
          ./infra/scripts/smoke-test.sh \
            --namespace tanzen-dev \
            --verbose
        env:
          TANZEN_NAMESPACE: tanzen-dev

      # ------------------------------------------------------------------
      # 10. Collect diagnostics on failure
      # ------------------------------------------------------------------
      - name: Collect diagnostics (on failure)
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n tanzen-dev -o wide
          echo ""
          echo "=== Events ==="
          kubectl get events -n tanzen-dev --sort-by='.lastTimestamp' | tail -40
          echo ""
          echo "=== Failed / crashing pod logs ==="
          kubectl get pods -n tanzen-dev --no-headers | \
            awk '$3 != "Running" && $3 != "Completed" {print $1}' | \
            xargs -I{} sh -c 'echo "--- {} ---"; kubectl logs -n tanzen-dev {} --tail=50 2>/dev/null; kubectl logs -n tanzen-dev {} --previous --tail=50 2>/dev/null || true'

      # ------------------------------------------------------------------
      # 11. Validate Helm chart templates
      # ------------------------------------------------------------------
      - name: Helm lint
        if: always()
        run: |
          helm lint infra/charts/tanzen \
            --values infra/charts/tanzen/values.yaml
